name: Release

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXEs
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pyinstaller

      - name: Build console EXE
        run: pyinstaller --clean --noconfirm packaging/vrcx2trakt-cli.spec

      - name: Build windowed GUI EXE
        run: pyinstaller --clean --noconfirm packaging/vrcx2trakt-gui.spec

      - name: Upload Windows artefacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exes
          path: |
            dist/vrcx2trakt.exe
            dist/vrcx2trakt-gui.exe
          if-no-files-found: error

      - name: Attach Windows EXEs to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/vrcx2trakt.exe
            dist/vrcx2trakt-gui.exe
          generate_release_notes: true

  build-sdist-wheel:
    name: Build Python distributions
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build frontend
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload Python distribution artefacts
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

      - name: Attach Python distributions to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
